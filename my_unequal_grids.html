<!DOCTYPE html>
<html>
  <head>
    <title> My Unequal Grids Page</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style type="text/css">
  h1 {
    color: coral;
  }
  #a1, #a4 {
    color: red;
    background: yellow;
    font-size: 20px;
  }
  #a2, #a5 {
    color: yellow;
    background: red;
    font-size: 20px;
  }
  #a3, #a6 {
    color: red;
    background: yellow;
    font-size: 20px;
  }
</style>
<body>
<div class="container-fluid">
  <h1>Unequal Area Grids</h1>
  <div class="row">
    <div id="a1" class="col-sm-5">Adding 1-5 grids</div>
    <div id="a2" class="col-sm-2">Adding 6-7 grids</div>
    <div id="a3" class="col-sm-5">Adding 8-12 grids</div>
  </div>

  <div class="row">
    <div id="a4" class="col-sm-4">Adding 1-4 grids</div>
    <div id="a5" class="col-sm-5">Adding 5-9 grids</div>
    <div id="a6" class="col-sm-3">Adding 10-12 grids</div>
  </div>
</div>
</body>
</html>
